<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBSL CONSULTORES SAC</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f8fafc}

header{background:#2563eb;color:white;text-align:center;padding:40px}
header h1{font-size:28px}

.banner img{
  width:100%;
  max-width:500px;
  display:block;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>IBSL CONSULTORES SAC</h1>
<p>Asesoría de tesis profesional</p>
</header>

<section class="banner">
<img src="banner.jpg">
</section>

<section class="grid">

<div class="card">
<img src="servicio1.jpg">
<p>Tesis completa</p>
</div>

<div class="card">
<img src="servicio2.jpg">
<p>Avances</p>
</div>

<div class="card">
<img src="servicio3.jpg">
<p>Corrección APA</p>
</div>

<div class="card">
<img src="servicio4.jpg">
<p>Estadística</p>
</div>

</section>

</body>
</html>
